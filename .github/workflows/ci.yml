name: CI Dev

# Eventos que disparam o workflow
on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      # Passo 1: Pega o código do repositório
      - uses: actions/checkout@v3

      # Passo 2: Configura Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Passo 3: Instala dependências do backend
      - name: Install backend dependencies
        run: npm install

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      # Passo 1: Pega o código do repositório
      - uses: actions/checkout@v3

      # Passo 2: Configura Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Passo 3: Instala dependências do frontend
      - name: Install frontend dependencies
        run: npm install

      # Passo 4: Build do frontend
      - name: Build frontend
        run: CI=false npm run build
